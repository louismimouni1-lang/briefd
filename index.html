<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Briefd">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-512.png">
<title>Briefd</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #000;
  --bg: #0d0d0d;
  --card: #1a1a1a;
  --card2: #222;
  --border: #2a2a2a;
  --border2: #333;
  --text: #fff;
  --text-2: #ababab;
  --text-3: #555;
  --orange: #ff5c00;
  --orange-dim: rgba(255,92,0,.12);
  --green: #30d780;
  --green-dim: rgba(48,215,128,.1);
  --red: #ff4545;
  --red-dim: rgba(255,69,69,.1);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,.1);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,.1);
  --r: 14px;
  --r-sm: 10px;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--black);
  color: var(--text);
  font-family: 'Sora', sans-serif;
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: var(--black);
  padding: calc(var(--safe-top) + 12px) 20px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 16px;
}

.app-name {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -.8px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 3px;
}

.live-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--green-dim);
  border: 1px solid rgba(48,215,128,.2);
  border-radius: 20px;
  padding: 5px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
}

.live-dot {
  width: 5px; height: 5px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.clock {
  font-size: 12px;
  color: var(--text-3);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

.markets {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.markets::-webkit-scrollbar { display: none; }

.mpill {
  flex-shrink: 0;
  background: var(--card);
  border-radius: 20px;
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 7px;
  border: 1px solid var(--border);
}

.mpill-label { font-size: 10.5px; font-weight: 600; color: var(--text-2); }
.mpill-val { font-size: 10.5px; font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; }
.mpill-chg { font-size: 10.5px; font-weight: 600; font-variant-numeric: tabular-nums; }
.up { color: var(--green); }
.dn { color: var(--red); }

/* FILTERS */
.filters {
  background: var(--black);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.filters::-webkit-scrollbar { display: none; }

.ftab {
  flex-shrink: 0;
  padding: 12px 14px 11px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Sora', sans-serif;
  transition: color .15s, border-color .15s;
}
.ftab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }

/* FEED */
.feed {
  padding: 14px 14px calc(80px + var(--safe-bottom));
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.date-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px 4px 4px;
}

.date-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: .07em;
  text-transform: uppercase;
}

.story-count { font-size: 11px; color: var(--text-3); }

/* LOADING */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 16px;
}

.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-size: 13px;
  color: var(--text-3);
  font-weight: 400;
}

/* CARD */
.card {
  background: var(--card);
  border-radius: var(--r);
  padding: 16px 16px 14px;
  cursor: pointer;
  transition: background .15s, transform .1s;
  border: 1px solid var(--border);
  animation: rise .3s ease both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:active { background: var(--card2); transform: scale(.985); }

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 11px;
}

.tag {
  font-size: 10.5px;
  font-weight: 600;
  padding: 4px 9px;
  border-radius: 7px;
}

.t-markets { background: var(--orange-dim); color: var(--orange); }
.t-ma      { background: var(--purple-dim); color: var(--purple); }
.t-macro   { background: var(--red-dim);    color: var(--red); }
.t-tech    { background: var(--green-dim);  color: var(--green); }
.t-hk      { background: var(--amber-dim);  color: var(--amber); }

.card-top-right { display: flex; align-items: center; gap: 9px; }
.card-time { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; }

.save-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 17px;
  line-height: 1;
  padding: 2px;
  color: var(--text-3);
  transition: color .15s;
}
.save-btn.saved { color: var(--amber); }

.card-headline {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 600;
  line-height: 1.35;
  color: var(--text);
  margin-bottom: 5px;
  letter-spacing: -.2px;
}

.card-source { font-size: 11px; color: var(--text-3); margin-bottom: 12px; }

.tw-box {
  background: rgba(255,255,255,.04);
  border-radius: var(--r-sm);
  border-left: 2.5px solid var(--orange);
  padding: 11px 13px;
  margin-bottom: 13px;
}

.tw-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--orange);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.tw-text { font-size: 13px; line-height: 1.58; color: var(--text-2); }

.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-dots { font-size: 11px; color: var(--border2); letter-spacing: 2px; }
.dive-btn { font-size: 12px; font-weight: 600; color: var(--text-2); }

/* SHEET */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translate(-50%, 100%);
  width: 100%;
  max-width: 430px;
  background: var(--bg);
  border-radius: 22px 22px 0 0;
  border-top: 1px solid var(--border);
  z-index: 201;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  transition: transform .32s cubic-bezier(.32,.72,0,1);
}
.sheet.open { transform: translate(-50%, 0); }

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 12px auto 0;
  flex-shrink: 0;
}

.sheet-scroll {
  overflow-y: auto;
  flex: 1;
  padding: 18px 20px 0;
}

.sh-tag-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.sh-time { font-size: 11px; color: var(--text-3); margin-left: auto; }

.sh-headline {
  font-family: 'Fraunces', serif;
  font-size: 23px;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: -.3px;
  color: var(--text);
  margin-bottom: 7px;
}

.sh-source {
  font-size: 11.5px;
  color: var(--text-3);
  margin-bottom: 18px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}

.sh-section { margin-bottom: 20px; }

.sh-section-title {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 10px;
}

.sh-takeaway {
  background: rgba(255,92,0,.07);
  border-left: 2.5px solid var(--orange);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  padding: 13px 15px;
  font-size: 14px;
  line-height: 1.65;
  color: #e0c8b8;
}

.sh-text { font-size: 14px; line-height: 1.78; color: var(--text-2); font-weight: 300; }

.impl-list { display: flex; flex-direction: column; gap: 8px; }

.impl-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  background: var(--card);
  border-radius: var(--r-sm);
  padding: 12px 13px;
  border: 1px solid var(--border);
}

.impl-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.impl-text { font-size: 13px; line-height: 1.58; color: var(--text-2); font-weight: 300; }

.sh-footer {
  padding: 14px 20px calc(14px + var(--safe-bottom));
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  flex-shrink: 0;
  background: var(--bg);
}

.btn-back {
  flex: 1;
  padding: 13px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border2);
  background: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  font-family: 'Sora', sans-serif;
}

.btn-source {
  flex: 2;
  padding: 13px;
  border-radius: var(--r-sm);
  border: none;
  background: var(--text);
  font-size: 13px;
  font-weight: 700;
  color: var(--black);
  cursor: pointer;
  font-family: 'Sora', sans-serif;
}

/* REFRESH BTN */
.refresh-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  font-family: 'Sora', sans-serif;
  display: flex;
  align-items: center;
  gap: 5px;
}

.refresh-btn:active { opacity: .7; }

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(13,13,13,.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 10px calc(10px + var(--safe-bottom));
  z-index: 100;
  gap: 4px;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 6px 0;
  border-radius: 12px;
}

.nav-item.active { background: var(--card); }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 500; color: var(--text-3); }
.nav-item.active .nav-label { color: var(--text); font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="app-name">Briefd</div>
    <div class="header-right">
      <div class="live-pill"><div class="live-dot"></div>Live</div>
      <div class="clock" id="clock">--:-- HKT</div>
    </div>
  </div>
  <div class="markets" id="markets">
    <div class="mpill"><span class="mpill-label">HSI</span><span class="mpill-val mpill-chg up">loading</span></div>
    <div class="mpill"><span class="mpill-label">USD/HKD</span><span class="mpill-val">7.783</span></div>
    <div class="mpill"><span class="mpill-label">CNH</span><span class="mpill-val">7.241</span></div>
    <div class="mpill"><span class="mpill-label">GOLD</span><span class="mpill-val up">$2,918</span></div>
    <div class="mpill"><span class="mpill-label">NIKKEI</span><span class="mpill-val dn">37,120</span></div>
  </div>
</div>

<div class="filters">
  <button class="ftab active" onclick="setFilter('all',this)">All</button>
  <button class="ftab" onclick="setFilter('markets',this)">Markets</button>
  <button class="ftab" onclick="setFilter('ma',this)">M&A</button>
  <button class="ftab" onclick="setFilter('macro',this)">Macro</button>
  <button class="ftab" onclick="setFilter('tech',this)">Tech</button>
  <button class="ftab" onclick="setFilter('hk',this)">HK Focus</button>
</div>

<div class="feed" id="feed">
  <div class="date-row">
    <div class="date-label" id="dateLabel">Loading...</div>
    <button class="refresh-btn" onclick="forceRefresh()" id="refreshBtn">↻ Refresh</button>
  </div>
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <div class="loading-text">Generating your brief...</div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-scroll" id="sheetContent"></div>
  <div class="sh-footer">
    <button class="btn-back" onclick="closeSheet()">← Back</button>
    <button class="btn-source" onclick="openSrc()">Full Article ↗</button>
  </div>
</div>

<div class="nav">
  <div class="nav-item active"><div class="nav-icon">🏠</div><div class="nav-label">Feed</div></div>
  <div class="nav-item" onclick="showSaved()"><div class="nav-icon">🔖</div><div class="nav-label">Saved</div></div>
  <div class="nav-item"><div class="nav-icon">✦</div><div class="nav-label">AI Brief</div></div>
</div>

<script>
const TC = { markets:'t-markets', ma:'t-ma', macro:'t-macro', tech:'t-tech', hk:'t-hk' }
const CACHE_KEY = 'briefd_v1'
const CACHE_TTL = 3 * 60 * 60 * 1000 // 3 hours

let NEWS = [], filter = 'all', saved = new Set(), current = null

// ── CLOCK ──
function updateClock() {
  const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Hong_Kong' }))
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ' HKT'
}
updateClock()
setInterval(updateClock, 30000)

// ── DATE ──
function updateDate() {
  const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Hong_Kong' }))
  document.getElementById('dateLabel').textContent = d.toLocaleDateString('en-GB', {
    weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
  }).toUpperCase()
}
updateDate()

// ── FETCH NEWS ──
async function fetchNews() {
  // Check cache
  const cached = localStorage.getItem(CACHE_KEY)
  if (cached) {
    const { data, timestamp } = JSON.parse(cached)
    if (Date.now() - timestamp < CACHE_TTL) {
      return data
    }
  }

  const res = await fetch('/api/news', { method: 'POST' })
  if (!res.ok) throw new Error('Server error: ' + res.status)
  const data = await res.json()

  localStorage.setItem(CACHE_KEY, JSON.stringify({ data, timestamp: Date.now() }))
  return data
}

async function loadNews() {
  document.getElementById('loadingState').style.display = 'flex'
  try {
    const data = await fetchNews()
    NEWS = data.stories
    renderFeed()
  } catch (err) {
    document.getElementById('loadingState').innerHTML = `
      <div style="font-size:13px;color:var(--red);text-align:center;line-height:1.6">
        Error loading news<br>
        <span style="color:var(--text-3);font-size:11px">${err.message}</span>
      </div>`
  }
}

async function forceRefresh() {
  localStorage.removeItem(CACHE_KEY)
  NEWS = []
  document.getElementById('loadingState').style.display = 'flex'
  document.getElementById('loadingState').innerHTML = '<div class="spinner"></div><div class="loading-text">Refreshing brief...</div>'
  // Remove old cards
  const feed = document.getElementById('feed')
  feed.querySelectorAll('.card').forEach(c => c.remove())
  await loadNews()
}

// ── RENDER ──
function tc(cat) { return TC[cat] || TC[(cat||'').toLowerCase()] || 't-hk' }

function renderFeed() {
  const feed = document.getElementById('feed')
  feed.querySelectorAll('.card').forEach(c => c.remove())
  document.getElementById('loadingState').style.display = 'none'

  const items = filter === 'all' ? NEWS : NEWS.filter(n => n.category === filter)
  
  // Update story count in date row
  const refreshBtn = document.getElementById('refreshBtn')
  refreshBtn.textContent = '↻ ' + items.length + ' stor' + (items.length === 1 ? 'y' : 'ies')

  items.forEach((item, i) => {
    const c = document.createElement('div')
    c.className = 'card'
    c.style.animationDelay = (i * 0.06) + 's'
    c.innerHTML = `
      <div class="card-top">
        <span class="tag ${tc(item.category)}">${item.shortTag}</span>
        <div class="card-top-right">
          <span class="card-time">${item.time}</span>
          <button class="save-btn ${saved.has(item.id) ? 'saved' : ''}" onclick="sv(event,${item.id})">${saved.has(item.id) ? '★' : '☆'}</button>
        </div>
      </div>
      <div class="card-headline">${item.headline}</div>
      <div class="card-source">${item.source}</div>
      <div class="tw-box">
        <div class="tw-label">Key Takeaway</div>
        <div class="tw-text">${item.takeaway}</div>
      </div>
      <div class="card-footer">
        <span class="card-dots">· · ·</span>
        <div class="dive-btn">Deep dive →</div>
      </div>`
    c.addEventListener('click', e => { if (!e.target.closest('.save-btn')) openSheet(item.id) })
    feed.appendChild(c)
  })
}

function setFilter(cat, btn) {
  filter = cat
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  if (NEWS.length) renderFeed()
}

function sv(e, id) {
  e.stopPropagation()
  saved.has(id) ? saved.delete(id) : saved.add(id)
  renderFeed()
}

function showSaved() {
  // Toggle saved filter
  const btn = document.querySelector('.ftab.active')
  NEWS_SAVED = NEWS.filter(n => saved.has(n.id))
  if (NEWS_SAVED.length === 0) return
  const tmp = NEWS
  NEWS = NEWS_SAVED
  renderFeed()
  NEWS = tmp
}

// ── SHEET ──
function openSheet(id) {
  current = NEWS.find(n => n.id === id)
  const c = current
  document.getElementById('sheetContent').innerHTML = `
    <div class="sh-tag-row">
      <span class="tag ${tc(c.category)}">${c.shortTag}</span>
      <span class="sh-time">${c.time} HKT · ${c.source}</span>
    </div>
    <div class="sh-headline">${c.headline}</div>
    <div class="sh-source">${c.source}</div>
    <div class="sh-section">
      <div class="sh-section-title">Key Takeaway</div>
      <div class="sh-takeaway">${c.takeaway}</div>
    </div>
    <div class="sh-section">
      <div class="sh-section-title">Context</div>
      <div class="sh-text">${c.body}</div>
    </div>
    <div class="sh-section">
      <div class="sh-section-title">Why It Matters</div>
      <div class="impl-list">${c.implications.map(i => `
        <div class="impl-item">
          <div class="impl-icon">${i.icon}</div>
          <div class="impl-text">${i.text}</div>
        </div>`).join('')}
      </div>
    </div>
    <div style="height:6px"></div>`
  document.getElementById('overlay').classList.add('open')
  document.getElementById('sheet').classList.add('open')
  document.body.style.overflow = 'hidden'
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open')
  document.getElementById('sheet').classList.remove('open')
  document.body.style.overflow = ''
}

function openSrc() {
  if (current && current.url) window.open(current.url, '_blank')
}

// ── INIT ──
loadNews()
</script>
</body>
</html>
